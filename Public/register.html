<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* CSS Gradient Text & Shadow Logo */
        .logo-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 2.8rem;
            font-weight: 600;
            text-align: center;
            margin: 0 auto 1.2rem auto;
            letter-spacing: -0.5px;
            
            /* Blue to Purple Gradient */
            background: linear-gradient(135deg, #2b5cff 30%, #a12cff 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Shadow effect optimized for gradient text */
            filter: drop-shadow(2px 4px 8px rgba(0, 0, 0, 0.2));
        }

        /* Modern Error Notification Styling */
        .error-box {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            display: none; 
            font-weight: 500;
        }

        /* Password Toggle Positioning */
        .input-group {
            position: relative;
        }
        .input-group input[type="password"],
        .input-group input[type="text"].password-input {
            padding-right: 40px; /* Space for the icon so text doesn't overlap */
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }
        .toggle-password:hover {
            color: #2b5cff;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-text">IndexSol</div>

        <h1 class="title">Create Account</h1>
        <p class="subtitle">Start your lifetime journey</p>
        
        <div id="error-message" class="error-box"></div>
        
        <form id="register-form">
            <div class="input-group">
                <input type="text" name="fullName" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input 
                    type="tel" 
                    name="mobileNumber" 
                    placeholder="Mobile Number" 
                    required 
                    pattern="[0-9]{10,15}" 
                    title="Please enter a valid mobile number between 10 and 15 digits (numbers only)."
                    oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                >
            </div>

            <div class="input-group">
                <input 
                    type="password" 
                    name="password" 
                    id="register-password"
                    class="password-input"
                    placeholder="Create Password (Min 6 characters)" 
                    required 
                    minlength="6"
                >
                <span class="toggle-password" onclick="togglePasswordVisibility('register-password', this)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <button type="submit" class="btn">Create Account</button>
        </form>
        <p class="toggle-text">Already have an account? <a href="login.html">Log In</a></p>
    </div>

    <script>
        // --- Password Visibility Toggle Logic ---
        function togglePasswordVisibility(inputId, iconContainer) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                // Change to Eye-Off SVG
                iconContainer.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            } else {
                input.type = "password";
                // Change back to Eye SVG
                iconContainer.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            }
        }

        // --- Registration Form Logic ---
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const errorBox = document.getElementById('error-message');
            errorBox.style.display = 'none'; 
            errorBox.innerText = '';

            const formData = new URLSearchParams(new FormData(this));

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Account successfully created!');
                    window.location.href = 'login.html'; 
                } else {
                    if (result.error && result.error.includes('profiles_username_key')) {
                        errorBox.innerText = "❌ That username is already taken. Please try another one.";
                    } else {
                        errorBox.innerText = result.error || "❌ Registration encountered an issue. Please try again.";
                    }
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                console.error("Connection error:", err);
                errorBox.innerText = "❌ System link error. Please check your network connection.";
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
