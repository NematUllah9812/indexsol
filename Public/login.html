<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* CSS Gradient Text & Shadow Logo */
        .logo-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 2.8rem;
            font-weight: 600;
            text-align: center;
            margin: 0 auto 1.2rem auto;
            letter-spacing: -0.5px;
            
            /* Blue to Purple Gradient */
            background: linear-gradient(135deg, #2b5cff 30%, #a12cff 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Shadow effect optimized for gradient text */
            filter: drop-shadow(2px 4px 8px rgba(0, 0, 0, 0.2));
        }

        /* Password Toggle Positioning */
        .input-group {
            position: relative;
        }
        .input-group input[type="password"],
        .input-group input[type="text"].password-input {
            padding-right: 40px; /* Space for the icon so text doesn't overlap */
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }
        .toggle-password:hover {
            color: #2b5cff;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-text">IndexSol</div>
        
        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Enter your credentials to access your account</p>
        
        <form>
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="login-password" class="password-input" placeholder="Password" required minlength="6">
                <span class="toggle-password" onclick="togglePasswordVisibility('login-password', this)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>
            <button type="submit" class="btn">Log In</button>
        </form>
        <p class="toggle-text">Don't have an account? <a href="register.html">Sign Up</a></p>
    </div>

    <script>
        // --- Password Visibility Toggle Logic ---
        function togglePasswordVisibility(inputId, iconContainer) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                // Change to Eye-Off SVG
                iconContainer.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            } else {
                input.type = "password";
                // Change back to Eye SVG
                iconContainer.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            }
        }

        // --- Login Form Logic ---
        const form = document.querySelector('form');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const username = form.querySelector('input[name="username"]').value;
            const password = form.querySelector('input[name="password"]').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = `/dashboard?user=${data.username}`;
                } else {
                    alert(data.error || 'Invalid login credentials.');
                }
            } catch (err) {
                console.error("Login Client Error:", err);
                alert('Could not connect to the server. Make sure node server.js is running!');
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered') === 'true') {
            alert("🎉 Account created successfully! Please log in with your credentials.");
        }
    </script>
</body>
</html>
